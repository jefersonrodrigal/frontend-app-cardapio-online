<nav class="navbar">
  <a class="navbar__brand" routerLink="/home">
    <i class="fa fa-utensils" aria-hidden="true"></i>
    Cardapio Online
  </a>
  <a class="navbar__admin-short" routerLink="/login" routerLinkActive="navbar__admin-short--active">
    Admin
  </a>

  <ul class="navbar__links">
    <li class="navbar__item">
      <a class="navbar__link" routerLink="/home" routerLinkActive="navbar__link--active">
        <i class="fa fa-home" aria-hidden="true"></i>
        <span>Inicio</span>
      </a>
    </li>
    <li class="navbar__item">
      <a class="navbar__link" routerLink="/acesso-cliente" routerLinkActive="navbar__link--active">
        <i class="fa fa-sign-in" aria-hidden="true"></i>
        <span>Entrar</span>
      </a>
    </li>
    <li class="navbar__item">
      <a
        class="navbar__link"
        routerLink="/my-orders"
        routerLinkActive="navbar__link--active"
        [class.navbar__link--active]="isTrackingRoute()"
      >
        <i class="fa fa-list-alt" aria-hidden="true"></i>
        <span>Pedidos</span>
      </a>
    </li>
    <li class="navbar__item navbar__item--admin">
      <a class="navbar__link" routerLink="/login" routerLinkActive="navbar__link--active">
        <i class="fa fa-lock" aria-hidden="true"></i>
        <span>Admin</span>
      </a>
    </li>
    <li class="navbar__item">
      <button type="button" class="navbar__link navbar__cart" aria-label="Abrir carrinho" (click)="openCart()">
        <i class="fa fa-shopping-cart" aria-hidden="true"></i>
        <span>Carrinho</span>
        <span class="navbar__cart-count">{{ cartCount() }}</span>
      </button>
    </li>
    <li class="navbar__item navbar__item--register">
      <a class="navbar__link navbar__cta" routerLink="/cadastro" routerLinkActive="navbar__link--active">
        <i class="fa fa-user-plus" aria-hidden="true"></i>
        <span>Cadastro</span>
      </a>
    </li>
  </ul>
</nav>
